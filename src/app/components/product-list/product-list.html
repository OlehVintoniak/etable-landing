<section id="products" class="product-list" aria-label="Наші столи">
  @if (products().length > 0) {
    <div class="product-list__stack">
      @for (product of products(); track product.id; let idx = $index) {
        <app-landing-card
          [product]="product"
          [reversed]="idx % 2 !== 0"
          [priority]="idx === 0"
        />
      }
    </div>
  } @else {
    <p class="product-list__empty">Наразі столи недоступні. Будь ласка, перевірте пізніше.</p>
  }
</section>
